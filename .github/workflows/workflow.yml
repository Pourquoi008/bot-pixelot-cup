name: "🚀 Lancement Bot Discord Pixelot Cup"

on:
  workflow_dispatch:

jobs:
  verify-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }} # 👈 AJOUTE CETTE LIGNE ICI !

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache des modules Python
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Installation des dépendances
      run: |
        python -m pip install --upgrade pip
        if [ -f "requirements.txt" ]; then pip install -r requirements.txt -q; fi

    - name: Lancement automatique du Bot
      run: |
        # Plus de find, plus de messages de dossiers trouvés, on lance direct !
        python main.py
name: "🚀 Lancement Bot Discord Pixelot Cup"

on:
  workflow_dispatch:

jobs:
  verify-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache des modules Python
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Installation des dépendances
      run: |
        python -m pip install --upgrade pip
        # On cherche le bon requirements.txt partout où il pourrait être
        REQ_PATH=$(find . -name "requirements.txt" | head -n 1)
        if [ -n "$REQ_PATH" ]; then pip install -r "$REQ_PATH"; fi

    - name: Lancement automatique du Bot
      run: |
        # 🎯 LA MAGIE : On cherche où est caché main.py dans la machine virtuelle
        MAIN_PATH=$(find . -name "main.py" | head -n 1)
        
        if [ -z "$MAIN_PATH" ]; then
          echo "❌ Impossible de trouver main.py dans le dépôt !"
          exit 1
        fi
        
        # On récupère le dossier parent de main.py
        BOT_DIR=$(dirname "$MAIN_PATH")
        echo "📂 Dossier du bot trouvé : $BOT_DIR"
        
        # On se déplace dedans et on lance le script
        cd "$BOT_DIR"
        python main.py